services:
  postgres:
    image: postgres:15-alpine
    container_name: dc-bi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dc_bi_db
      POSTGRES_USER: dc_bi_user
      POSTGRES_PASSWORD: dc_bi_pass123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "54930:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dc_bi_user -d dc_bi_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dc-bi-network

volumes:
  postgres_data:
    driver: local

networks:
  dc-bi-network:
    driver: bridge
